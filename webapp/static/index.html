<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>配图说 — 多图配文</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="hero">
        <p class="eyebrow">多图 · 配文</p>
        <h1>把画面写成几句话</h1>
        <p class="lead">
          上传最多 9 张图，描述画面后，一次给出三种不同说法；想换语气可再生成一版。
        </p>
      </header>

      <p class="scenario-strip card" role="note">
        今天拍了美食？娃又闹笑话了？出去玩了？选好图片，剩下的交给 AI。
      </p>

      <form id="f" class="card form-card">
        <div
          class="drop"
          id="drop"
          tabindex="0"
          role="button"
          aria-label="将图片拖到此处或点击选择"
        >
          <span class="drop-icon" aria-hidden="true">＋</span>
          <p><strong>拖放图片到这里</strong>，或点击下方选择（最多 9 张）</p>
        </div>
        <div class="btns">
          <label class="filebtn"
            ><input id="pick" type="file" accept="image/*" multiple />选择图片</label
          >
          <label class="filebtn"
            ><input id="folder" type="file" accept="image/*" webkitdirectory multiple />整个文件夹</label
          >
          <button type="button" class="btn-ghost" id="clear">清空</button>
        </div>
        <div class="thumbs" id="thumbs"></div>
        <p class="hint" id="count">已选 0 张</p>

        <h3 class="section-title">语气与长度</h3>
        <p class="persona-intro">点一下人设，自动填好风格；也可再改几个字。</p>
        <div class="persona-chips" id="persona_chips">
          <button type="button" class="chip" data-style="文艺青年（小忧郁、偏爱意象与留白，不大白话堆砌）" data-tone="fresh" data-hint="示例：傍晚把影子拉得很长，人却轻了。">
            文艺青年
          </button>
          <button type="button" class="chip" data-style="搞笑风（自黑、夸张、谐音梗，轻松得体不冒犯）" data-tone="hot" data-hint="示例：这顿饭，我的胃已经单方面官宣了。">
            搞笑女/男
          </button>
          <button type="button" class="chip" data-style="宝妈晒娃（温柔可爱、记录成长小细节、口语亲切）" data-tone="fresh" data-hint="示例：今天又解锁一个「人类幼崽迷惑行为」。">
            宝妈晒娃
          </button>
          <button type="button" class="chip" data-style="职场卷王（正能量、成就感、打鸡血但不说教）" data-tone="hot" data-hint="示例：本周 KPI：把开心也写进待办里。">
            职场卷王
          </button>
        </div>
        <p class="persona-hint" id="persona_hint" hidden></p>
        <div class="row cols-2">
          <div>
            <label for="style">风格</label>
            <input id="style" name="style" type="text" list="styles" value="幽默风趣" />
            <datalist id="styles">
              <option value="幽默风趣"></option>
              <option value="文艺青年"></option>
              <option value="治愈温柔"></option>
              <option value="极简冷淡"></option>
              <option value="旅行记录"></option>
            </datalist>
          </div>
          <div>
            <label for="length_hint">长度说明</label>
            <input id="length_hint" name="length_hint" type="text" value="不超过50字" />
          </div>
        </div>

        <div class="row cols-2">
          <div>
            <label for="output_language">输出语言</label>
            <select id="output_language" name="output_language">
              <option value="zh-Hans" selected>简体中文</option>
              <option value="zh-Hant">繁体中文</option>
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
            </select>
          </div>
          <div>
            <label for="provider">模型</label>
            <select id="provider" name="provider">
              <option value="deepseek">DeepSeek</option>
              <option value="qwen">通义千问</option>
            </select>
          </div>
        </div>

        <div class="row cols-2">
          <div>
            <label for="min_chars">最短（字符数）</label>
            <input id="min_chars" name="min_chars" type="number" min="1" max="500" value="10" />
          </div>
          <div>
            <label for="max_chars">最长（字符数）</label>
            <input id="max_chars" name="max_chars" type="number" min="1" max="500" value="72" />
          </div>
        </div>

        <div class="row toggle cols-2">
          <label><input id="use_emoji" type="checkbox" checked /> 允许 emoji</label>
          <label><input id="use_punctuation" type="checkbox" checked /> 使用标点</label>
        </div>
        <div class="row toggle">
          <label
            ><input id="append_copy_tail" type="checkbox" />
            复制时在末尾加一句小尾巴（仅复制，不改动页面上文案）</label
          >
        </div>

        <h3 class="section-title">补充与歌词</h3>
        <div>
          <label for="supplement">补充想法（可选）</label>
          <textarea
            id="supplement"
            maxlength="4000"
            placeholder="语气偏好、想点的题、避雷、参考句式…"
          ></textarea>
        </div>

        <div class="lyric-panel">
          <div class="row cols-2">
            <div>
              <label for="lyric_mode">歌词感</label>
              <select id="lyric_mode" name="lyric_mode">
                <option value="none" selected>不使用</option>
                <option value="imagistic">意象留白（通用）</option>
                <option value="ballad">抒情慢歌</option>
                <option value="rock">摇滚张力</option>
                <option value="rap">说唱节奏</option>
                <option value="classic">古风意象</option>
              </select>
            </div>
            <div>
              <label for="lyric_snippet">歌词摘录（可选）</label>
              <textarea
                id="lyric_snippet"
                maxlength="1200"
                rows="3"
                placeholder="贴一两句喜欢的歌词，作语气与意象参考（勿过长）"
              ></textarea>
            </div>
          </div>
          <p class="fineprint">
            摘录仅作风格参考，生成内容会改写融合；与上方「补充想法」会一起发给模型。
          </p>
        </div>

        <div>
          <label for="extra_blocked" class="label-with-tip"
            >不想出现在文案里的词（可选）
            <abbr class="help-tip" title="输入不希望出现在文案里的词，如「加班」「减肥」，用逗号或换行分隔；与服务器词表合并，命中会打码。">提示</abbr></label
          >
          <textarea
            id="extra_blocked"
            placeholder="例：加班，减肥，甲方（逗号、顿号或换行分隔均可）"
          ></textarea>
        </div>

        <div class="btns btns-footer">
          <button type="submit" class="primary" id="submit">生成三条</button>
          <button type="button" class="btn-secondary" id="regen" disabled>换三条说法</button>
        </div>
        <p class="fineprint">长度按字符个数校验；结果中带固定行首标记以便解析。</p>
        <div class="err" id="err" hidden></div>
      </form>

      <div class="card out-card" id="out" hidden>
        <h3 class="section-title">画面概要</h3>
        <div class="desc" id="desc"></div>
        <p class="mood-line" id="mood_line" hidden></p>
        <div class="thermo" id="thermo" hidden aria-hidden="true">
          <div class="thermo-caption">文案温度计</div>
          <div class="thermo-labels">
            <span>🧊 冷静</span>
            <span>🌱 清新</span>
            <span>🔥 热情</span>
          </div>
          <div class="thermo-bar"><span class="thermo-nub" id="thermo_nub"></span></div>
        </div>
        <h3 class="section-title">备选三条</h3>
        <div id="cands"></div>
      </div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
