<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>配图说 — 多图配文</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="hero">
        <p class="eyebrow">🖼️ AI 朋友圈配文</p>
        <h1>图拍好了，文案交给 AI</h1>
        <p class="lead">上传照片，选个风格，一键生成三条候选文案，挑一条发出去。</p>
      </header>

      <form id="f" class="card form-card">
        <section class="panel-block panel-primary" aria-label="上传与生成">
          <label class="no-image-toggle toggle-pill toggle-pill-wide">
            <input id="no_image_mode" type="checkbox" />
            <span>📝 无图片，直接写想法</span>
          </label>

          <div id="image-upload-block">
          <div
            class="drop"
            id="drop"
            tabindex="0"
            role="button"
            aria-label="将图片拖到此处或点击选择"
          >
            <span class="drop-icon" aria-hidden="true">＋</span>
            <p class="drop-title"><strong>添加图片</strong></p>
            <p class="drop-sub">拖放、点击选择，或选整个文件夹</p>
          </div>
          <div class="btns">
            <label class="filebtn"
              ><input id="pick" type="file" accept="image/*" multiple />选择图片</label
            >
            <label class="filebtn"
              ><input id="folder" type="file" accept="image/*" webkitdirectory multiple />文件夹</label
            >
            <button type="button" class="btn-ghost" id="clear">清空</button>
          </div>
          <div class="thumbs" id="thumbs"></div>
          <p class="hint" id="count">已选 0 张</p>
          <label class="toggle-pill toggle-pill-wide emoji-tone-row" id="emoji_tone_wrap">
            <input id="emoji_color_suggest" type="checkbox" />
            <span>🎨 让 AI 根据图片色调搭配 emoji</span>
          </label>
          </div>

          <div id="text-idea-block" class="text-idea-block" hidden>
            <label for="text-idea-input" class="sr-only">想法或关键词</label>
            <textarea
              id="text-idea-input"
              maxlength="2000"
              rows="3"
              placeholder="写写你想表达的心情、关键词或一句话，例如：&#10;「周末爬山好累但值得」&#10;「今天咖啡拉花成功了」&#10;「想发点积极的话，但不知道写什么」"
            ></textarea>
            <p class="hint text-idea-hint">
              💡 不用写完整句子，几个关键词也行，AI 会帮你扩展成适合朋友圈的短文案。
            </p>
          </div>

          <div class="btns btns-primary">
            <button type="submit" class="primary btn-large" id="submit">生成三条</button>
            <button type="button" class="btn-secondary btn-large" id="regen" disabled>换三条</button>
          </div>
        </section>

        <details class="adv-details panel-block">
          <summary class="adv-summary">⚙️ 高级文案偏好（点击展开）</summary>
          <div class="adv-inner">
            <div class="row cols-2">
              <div>
                <label for="style">文案风格</label>
                <select id="style" name="style">
                  <option value="humor" selected>😄 幽默风趣</option>
                  <option value="literary">✍️ 文艺清新</option>
                  <option value="concise">💼 简洁干练</option>
                  <option value="lyrical">🎵 歌词感</option>
                  <option value="daily_life">🏠 生活随记</option>
                  <option value="travel">✈️ 旅行手记</option>
                  <option value="fun">😂 玩梗整活</option>
                  <option value="recommend">🛍️ 种草安利</option>
                </select>
                <p class="style-desc" id="style_desc">好笑、轻松，自带梗但不油腻</p>
              </div>
              <div>
                <label for="provider">模型</label>
                <select id="provider" name="provider">
                  <option value="deepseek">DeepSeek</option>
                  <option value="qwen">通义千问</option>
                </select>
              </div>
            </div>

            <div class="row cols-2">
              <div>
                <label for="min_chars">最短字数（字符）</label>
                <input id="min_chars" name="min_chars" type="number" min="1" max="500" value="10" />
              </div>
              <div>
                <label for="max_chars">最长字数（字符）</label>
                <input id="max_chars" name="max_chars" type="number" min="1" max="500" value="72" />
              </div>
            </div>

            <div>
              <label for="output_language">输出语言</label>
              <select id="output_language" name="output_language">
                <option value="zh-Hans" selected>简体中文</option>
                <option value="zh-Hant">繁体中文</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="mix">🌐 中英夹杂（Casual mix）</option>
              </select>
            </div>

            <div>
              <label for="supplement">补充想法（可选）</label>
              <textarea
                id="supplement"
                maxlength="4000"
                rows="2"
                placeholder="想让 AI 知道的额外信息，例如：&#10;• 今天心情特别好，想发点开心的&#10;• 用词别太文艺，接地气一点&#10;• 配的是和闺蜜的合照"
              ></textarea>
            </div>

            <div>
              <label for="inspiration">💡 引用灵感（选填）</label>
              <textarea
                id="inspiration"
                maxlength="1200"
                rows="2"
                placeholder="参考某种语气或风格，例如：&#10;• 像陈奕迅《富士山下》那种淡淡的遗憾感&#10;• 模仿村上春树的简洁句子&#10;• 类似小红书探店博主的口吻"
              ></textarea>
            </div>

            <div>
              <label for="extra_blocked" class="label-with-tip"
                >不想出现在文案里的词（可选）
                <abbr
                  class="help-tip"
                  title="用逗号或换行分隔；与服务器词表合并，命中会打码；并会提示模型主动避开这些词。"
                  >提示</abbr
                ></label
              >
              <textarea
                id="extra_blocked"
                placeholder="例如：emo、加班、凡尔赛"
              ></textarea>
            </div>

            <div class="switch-row" aria-label="格式选项">
              <label class="toggle-pill"
                ><input id="use_emoji" type="checkbox" checked /><span>允许 emoji</span></label
              >
              <label class="toggle-pill"
                ><input id="use_punctuation" type="checkbox" checked /><span>使用标点</span></label
              >
            </div>
            <label class="toggle-pill toggle-pill-wide"
              ><input id="append_copy_tail" type="checkbox" /><span>复制时在末尾加一句小尾巴</span></label
            >
          </div>
        </details>

        <div class="err" id="err" hidden></div>
      </form>

      <div id="progress_line" class="progress-line" hidden>
        <span class="btn-spinner" style="width:14px;height:14px;border-width:2px;border-color:rgba(180,83,9,0.25);border-top-color:#b45309;"></span>
        <span id="progress_text">正在准备…</span>
        <span class="progress-dot"></span><span class="progress-dot"></span><span class="progress-dot"></span>
      </div>

      <div class="card out-card" id="out" hidden>
        <h3 class="section-title">画面概要</h3>
        <div class="desc" id="desc"></div>
        <p class="mood-line" id="mood_line" hidden></p>
        <div id="color_swatches" class="color-swatches" hidden>
          <span class="color-label">🎨 封面主色</span>
          <span id="color_dots"></span>
          <span id="color_warmth" class="color-warmth"></span>
        </div>
        <div class="thermo" id="thermo" hidden aria-hidden="true">
          <div class="thermo-caption">文案温度计</div>
          <div class="thermo-labels">
            <span>🧊 冷静</span>
            <span>🌱 清新</span>
            <span>🔥 热情</span>
          </div>
          <div class="thermo-bar"><span class="thermo-nub" id="thermo_nub"></span></div>
        </div>
        <h3 class="section-title">备选三条</h3>
        <div id="cands"></div>
        <p id="memory_hint" class="memory-hint" hidden></p>
        <div id="review_block" class="review-block" hidden>
          <h3 class="section-title">🤖 Agent 审稿</h3>
          <div id="review_content"></div>
        </div>
      </div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
